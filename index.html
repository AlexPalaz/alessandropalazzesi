<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alessandro Palazzesi — Frontend Architect & Technical Lead</title>
  <meta name="description" content="Frontend Architect & Technical Lead. Building scalable web platforms and AI-powered products. Based in Turin, available for consulting engagements." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }
    :root { --page-pad: 48px; }
    @media (max-width: 768px) { :root { --page-pad: 16px; } }
    @media (max-width: 380px) { :root { --page-pad: 12px; } }
    html, body {
      margin: 0; padding: 0;
      background: #0A0E0D; color: #D4D2CB;
      font-family: "Inter Tight", system-ui, sans-serif;
      scroll-behavior: smooth;
    }
    body { min-height: 100vh; }
    ::selection { background: oklch(0.78 0.12 175); color: #0A0E0D; }
    a { color: inherit; }
    input::placeholder, textarea::placeholder { color: rgba(212, 210, 203, 0.35); }
    select option { color: #D4D2CB; background: #0A0E0D; }

    /* Page fade transition */
    .page-fade { opacity: 0; transform: translateY(8px); animation: pageIn .45s ease forwards; }
    @keyframes pageIn { to { opacity: 1; transform: translateY(0); } }

    /* ===== Mobile overrides ===== */
    @media (max-width: 768px) {
      /* Compact vertical padding on every centered container (section OR inner div).
         Horizontal padding is handled by --page-pad on the inline style itself. */
      main section,
      main [style*="margin: 0 auto"],
      main [style*="margin: 0px auto"] {
        padding-top: 44px !important;
        padding-bottom: 44px !important;
      }

      /* Disable sticky positioning on mobile (testimonial author column, etc.) */
      main div[style*="position: sticky"] {
        position: static !important;
        top: auto !important;
      }

      /* Speed up marquee on mobile so it feels alive */
      main div[style*="animation: marquee"] {
        animation-duration: 18s !important;
      }

      /* Collapse multi-column grids to a single column, except form label rows */
      main div[style*="grid-template-columns"]:not([style*="120px"]) {
        grid-template-columns: 1fr !important;
        gap: 32px !important;
      }
      main div[style*="grid-template-columns: 120px"] {
        grid-template-columns: 88px 1fr !important;
        gap: 12px !important;
      }

      /* Big headings scale */
      main h1 {
        font-size: clamp(38px, 11vw, 64px) !important;
        line-height: 1.04 !important;
        margin-bottom: 20px !important;
        letter-spacing: -0.02em !important;
      }
      main h2 {
        font-size: clamp(26px, 7vw, 42px) !important;
        line-height: 1.1 !important;
      }
      main p { font-size: 16px !important; }

      /* Testimonial quote */
      main blockquote { font-size: 18px !important; line-height: 1.55 !important; }

      /* Button rows wrap (hero CTA, home CTA, contact channels) */
      main div[style*="justify-content: center"][style*="gap: 16px"],
      main div[style*="display: flex"][style*="gap: 12px"],
      main div[style*="display: flex"][style*="gap: 16px"] {
        flex-wrap: wrap !important;
      }

      /* Hero marquee: smaller, still scrollable */
      main div[style*="animation: marquee"] {
        font-size: 22px !important;
        gap: 36px !important;
      }

      /* Large inner-card paddings collapse so content has room to breathe */
      main div[style*="padding: 40px"],
      main div[style*="padding: 40"] {
        padding: 18px !important;
      }
      main div[style*="padding: 32px"],
      main div[style*="padding: 32"] {
        padding: 16px !important;
      }
      main div[style*="padding: 28px"],
      main div[style*="padding: 28"] {
        padding: 16px !important;
      }
      main form[onSubmit],
      main form {
        padding: 0 !important;
      }
      main div[style*="padding: 40px"] form,
      main div[style*="padding: 40"] form { padding: 0 !important; }

      /* Testimonials: tighter vertical rhythm + ditch the sticky author column */
      main div[style*="padding: 72px 0"] {
        padding: 32px 0 !important;
      }

      /* Case study body rows (label column + content) — let content flow */
      main div[style*="grid-template-columns: 200px 1fr"],
      main div[style*="grid-template-columns: 220px 1fr"] {
        gap: 16px !important;
      }

      /* Code-block hero: allow wrapping rather than overflowing */
      main div[style*="padding-left: 24px"] {
        padding-left: 12px !important;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      /* Reduce giant numbers (about page) so they don't wrap awkwardly */
      main div[style*="font-size: 72px"] { font-size: 48px !important; }
      main div[style*="font-size: 64px"] { font-size: 44px !important; }

      /* ---- Status bar (outside main) ---- */
      .status-bar { padding: 8px 14px !important; font-size: 10px !important; }
      .status-bar-left { gap: 10px !important; flex-wrap: wrap !important; min-width: 0; }
      .status-bar-left > span:nth-child(2) {
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60vw;
      }
      .status-bar-right { display: none !important; }

      /* ---- Nav bar ---- */
      .site-nav { padding: 12px 16px !important; gap: 10px !important; flex-wrap: wrap !important; }
      .site-nav > a:first-child { font-size: 13px !important; }
      .nav-menu {
        gap: 14px !important;
        font-size: 12px !important;
        order: 3 !important;
        width: 100% !important;
        flex-wrap: wrap !important;
        row-gap: 8px !important;
        justify-content: flex-start !important;
        padding-top: 4px;
      }
      .nav-cta { padding: 8px 12px !important; font-size: 11px !important; }

      /* ---- Footer ---- */
      .site-footer { padding: 32px 18px !important; }
      .footer-grid {
        grid-template-columns: 1fr !important;
        gap: 28px !important;
        padding-bottom: 24px !important;
      }
      .footer-bottom {
        flex-direction: column !important;
        gap: 8px !important;
        align-items: flex-start !important;
        font-size: 10px !important;
      }
    }

    /* ===== Ultra-narrow (phones <=380px) ===== */
    @media (max-width: 380px) {
      main section[style*="0 48px"],
      main section > div[style*="0 48px"] {
        padding-left: 12px !important;
        padding-right: 12px !important;
      }
      main div[style*="padding: 40px"],
      main div[style*="padding: 40"] { padding: 14px !important; }
      main div[style*="padding: 32px"],
      main div[style*="padding: 32"] { padding: 14px !important; }
      main h1 { font-size: clamp(32px, 10.5vw, 48px) !important; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="site/shared.jsx"></script>
  <script type="text/babel" src="site/pages/home.jsx"></script>
  <script type="text/babel" src="site/pages/work.jsx"></script>
  <script type="text/babel" src="site/pages/case-study.jsx"></script>
  <script type="text/babel" src="site/pages/services.jsx"></script>
  <script type="text/babel" src="site/pages/process.jsx"></script>
  <script type="text/babel" src="site/pages/about.jsx"></script>
  <script type="text/babel" src="site/pages/contact.jsx"></script>

  <script type="text/babel">
    const App = () => {
      const { THEME, GridBg, StatusBar, NavBar, Footer,
              HomePage, WorkPage, CaseStudyPage, ServicesPage,
              ProcessPage, AboutPage, ContactPage } = window;

      const [route, setRoute] = React.useState(window.location.hash || '#/');

      React.useEffect(() => {
        const onHash = () => {
          setRoute(window.location.hash || '#/');
          // scroll to top on route change
          window.scrollTo({ top: 0, behavior: 'instant' });
        };
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      const navigate = (hash) => {
        if (hash === window.location.hash) {
          window.scrollTo({ top: 0, behavior: 'smooth' });
          return;
        }
        window.location.hash = hash;
      };

      // Route matching
      let page, statusPath;
      if (route === '#/' || route === '') {
        page = <HomePage onNavigate={navigate} />;
        statusPath = '/';
      } else if (route === '#/work') {
        page = <WorkPage onNavigate={navigate} />;
        statusPath = '/work';
      } else if (route.startsWith('#/work/')) {
        const slug = route.slice('#/work/'.length);
        page = <CaseStudyPage slug={slug} onNavigate={navigate} />;
        statusPath = `/work/${slug}`;
      } else if (route === '#/services') {
        page = <ServicesPage onNavigate={navigate} />;
        statusPath = '/services';
      } else if (route === '#/process') {
        page = <ProcessPage onNavigate={navigate} />;
        statusPath = '/process';
      } else if (route === '#/about') {
        page = <AboutPage onNavigate={navigate} />;
        statusPath = '/about';
      } else if (route === '#/contact') {
        page = <ContactPage onNavigate={navigate} />;
        statusPath = '/contact';
      } else {
        page = (
          <section style={{ maxWidth: 1080, margin: '0 auto', padding: '160px 48px', textAlign: 'center' }}>
            <div style={{ color: THEME.dim, fontFamily: THEME.mono, fontSize: 13, marginBottom: 16 }}>
              <span style={{ color: THEME.accent }}>$</span> find . -name "{route.slice(2)}"
            </div>
            <h1 style={{ fontFamily: THEME.sans, fontSize: 72, color: THEME.fgStrong, margin: 0, fontWeight: 500 }}>
              404 — <span style={{ fontFamily: THEME.serif, fontStyle: 'italic', color: THEME.accent }}>not found</span>
            </h1>
            <a href="#/" onClick={() => navigate('#/')} style={{ color: THEME.accent, fontFamily: THEME.mono, display: 'inline-block', marginTop: 24 }}>
              ← back home
            </a>
          </section>
        );
        statusPath = route.slice(1);
      }

      return (
        <>
          <GridBg />
          <StatusBar path={statusPath} />
          <NavBar route={route} onNavigate={navigate} />
          <div key={route} className="page-fade">
            <Page>{page}</Page>
          </div>
          <Footer />
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
